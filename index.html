<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>גישה חסומה</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      direction: rtl;
      background: radial-gradient(circle at top, #1a1f2e, #0b0f1a 60%, #05070d);
      overflow: hidden;
      color: white;
    }

    .blob {
      position: absolute;
      width: 500px;
      height: 500px;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      filter: blur(120px);
      opacity: 0.25;
      border-radius: 50%;
      animation: float 8s infinite ease-in-out;
    }

    .blob.two {
      background: linear-gradient(135deg, #a18cd1, #fbc2eb);
      top: 60%;
      left: 60%;
      animation-delay: 2s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-40px) translateX(30px); }
    }

    .card {
      position: relative;
      z-index: 2;
      padding: 40px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      text-align: center;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .icon {
      font-size: 50px;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    p {
      font-size: 16px;
      opacity: 0.8;
      line-height: 1.5;
    }

    .line {
      margin-top: 20px;
      height: 2px;
      width: 60px;
      background: linear-gradient(90deg, #4facfe, #a18cd1);
      margin-left: auto;
      margin-right: auto;
      border-radius: 2px;
    }
  </style>
</head>

<body>

  <div class="blob"></div>
  <div class="blob two"></div>

  <div class="card">
    <div class="icon">⛔</div>
    <h1>הגישה לדף זה נחסמה</h1>
    <p>
      אין לך הרשאה לצפות בתוכן זה.<br>
      אנא פנה למנהל המערכת או נסה שוב מאוחר יותר.
    </p>
    <div class="line"></div>
  </div>

</body>
</html>
